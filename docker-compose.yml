version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: bloodlink-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: bloodlink
      MONGO_INITDB_ROOT_PASSWORD: bloodlink123
      MONGO_INITDB_DATABASE: bloodlink
    volumes:
      - mongodb_data:/data/db
    networks:
      - bloodlink-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloodlink-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://bloodlink:bloodlink123@mongodb:27017/bloodlink?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - bloodlink-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloodlink-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - bloodlink-network

volumes:
  mongodb_data:
    driver: local

networks:
  bloodlink-network:
    driver: bridge
